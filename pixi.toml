[workspace]
authors = ["clami66 <claudio.mirabello@scilifelab.se>"]
channels = ["conda-forge"]
name = "workshop_nn_dl"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[dependencies]
python = ">=3.12.0,<3.13"
curl = ">=8.19.0,<9"
pip = ">=26.0.1,<27"

[pypi-dependencies]
jupyter = ">=1.1.1, <2"
matplotlib = ">=3.10.8, <4"
segmentation-models-pytorch = "*"
nbformat = ">=5.10.4, <6"

# Default (CPU / generic) torch — used by teachers and basics environments
[feature.torch.pypi-dependencies]
torch = ">=2.10.0, <3"
torchvision = "*"
torchmetrics = "*"

[feature.rocm]
platforms = ["linux-64"]

# ROCm torch — install from the AMD ROCm PyPI index (for local AMD GPU use)
[feature.rocm.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/rocm7.2"]

[feature.rocm.dependencies]
setuptools = "<82"

[feature.rocm.pypi-dependencies]
torch = { version = ">=2.5.0, <3", index = "https://download.pytorch.org/whl/rocm7.2" }
torchvision = { version = ">=0.20.0, <1", index = "https://download.pytorch.org/whl/rocm7.2" }

[feature.rise-jupyter.pypi-dependencies]
jupyterlab_rise = "*"
jupytext = ">=1.19.1, <2"

[feature.quarto.dependencies]
quarto = "*"

[feature.pythonlibs.pypi-dependencies]
pandas = "*"
scikit-learn = ">=1.8.0, <2"
numpy = ">=2.4.3, <3"
jupyterquiz = ">=2.9.6.4, <3"
pyyaml = "*"
tqdm = "< 5"
jupyter-cache = ">=1.0.1, <2"
pillow = "*"
scipy = "*"
scikit-image = "*"
seaborn = ">=0.13.2,<0.14"
umap-learn = ">=0.5.12,<0.6"
segmentation-models-pytorch = "*"
medmnist = ">=3.0.2, <4"
open-clip-torch = ">=2.24.0, <3"

[feature.pythonlibs.dependencies]
plotly = ">=6.6.0,<7"
anywidget = ">=0.10.0,<0.11"
manim = ">=0.20.1,<0.21"

[feature.rlibs.dependencies]
r-base = "*"
r-codetools = "*"
r-htmltools = "*"
r-kableextra = "*"
r-knitr = "*"
r-reticulate = "*"
r-rmarkdown = "*"
r-tidyverse = "*"
r-vctrs = "*"
r-magick = ">=2.9.1,<3"
r-pdftools = ">=3.7.0,<4"
r-devtools = ">=2.5.0,<3"

[environments]
default = ["torch", "pythonlibs"]
quarto = ["quarto"]
teachers = ["torch", "quarto", "pythonlibs", "rlibs"]
basics = ["torch", "rise-jupyter", "quarto", "pythonlibs"]
local-amd = ["rocm", "rise-jupyter", "quarto", "pythonlibs"]
rnn = ["quarto", "pythonlibs", "torch", "rlibs"]

[tasks.fix_mds]
cmd = "bash scripts/fix_mds.sh"
default-environment = "teachers"

[tasks.render_all]
cmd = "quarto render --profile all --to html $QUARTO_META"
default-environment = "teachers"
depends-on = ["fix_mds"]

[tasks.sync_sitelibs]
cmd = "cp -r _site/site_libs _site_libs_backup"
default-environment = "teachers"
depends-on = ["render_all"]

[tasks.render_ipynb]
cmd = "quarto render --profile ipynb --to ipynb --no-clean $QUARTO_META"
default-environment="teachers"
depends-on = ["sync_sitelibs"]

[tasks.render_revealjs]
cmd = "quarto render --profile revealjs --no-clean $QUARTO_META"
default-environment = "teachers"
depends-on = ["render_ipynb"]

[tasks.render]
cmd = "rsync -av _site_libs_backup/ _site/site_libs/ && rm -rf _site_libs_backup"
default-environment = "teachers"
depends-on = ["render_revealjs"]

[tasks.render_labs]
cmd = "sh ./scripts/render_labs.sh"
default-environment="quarto"
