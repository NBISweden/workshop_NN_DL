[workspace]
authors = ["clami66 <claudio.mirabello@scilifelab.se>"]
channels = ["conda-forge"]
name = "workshop_nn_dl"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.12.0,<3.13"
curl = ">=8.19.0,<9"
git = ">=2.53.0,<3"

[pypi-dependencies]
jupyter = ">=1.1.1, <2"
matplotlib = ">=3.10.8, <4"

# Default (CPU / generic) torch — used by teachers and basics environments
[feature.torch.pypi-dependencies]
torch = ">=2.10.0, <3"

# ROCm torch — install from the AMD ROCm PyPI index (for local AMD GPU use)
[feature.rocm.pypi-options]
extra-index-urls = ["https://download.pytorch.org/whl/rocm6.2"]

[feature.rocm.pypi-dependencies]
torch = { version = ">=2.5.0, <3", index = "https://download.pytorch.org/whl/rocm6.2" }
torchvision = { version = ">=0.20.0, <1", index = "https://download.pytorch.org/whl/rocm6.2" }

[feature.quarto.dependencies]
quarto = "*"

[feature.manim.dependencies]
ffmpeg = ">=7,<8"
manim = ">=0.18"
#pangocairo = ">=1.30.0"

#[feature.manim.dependencies]
#manim = ">=0.18,<1"


[environments]
teachers = ["torch"]
basics = ["torch", "quarto", "manim"]
local-amd = ["rocm", "quarto", "manim"]

